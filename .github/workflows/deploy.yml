# Deploy to cPanel: SSH+rsync (fast, minutes) or FTP (slower).
# - For FAST deploys (minutes): add GitHub secrets SSH_HOST, SSH_USERNAME, SSH_PRIVATE_KEY,
#   and SSH_REMOTE_WEB_ROOT (e.g. public_html), SSH_REMOTE_API_PATH (e.g. public_html/api).
#   Enable SSH in cPanel and add the public key; rsync only sends changed files.
# - If only FTP is set: we use FTP with explicit state-name so incremental sync works.
# - Path-based: only frontend or backend runs when only that part changed.

name: Deploy to cPanel

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deploy target (leave empty to use path detection on push)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - frontend
          - backend
          - all

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PHP_VERSION: "8.2"

jobs:
  detect-changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      config: ${{ steps.filter.outputs.config }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend-php/**'
            frontend:
              - 'frontend/**'
              - 'cpanel-htaccess'
            config:
              - '.github/workflows/**'

  check-deploy-method:
    name: Check deploy method
    runs-on: ubuntu-latest
    outputs:
      use_ssh: ${{ steps.method.outputs.use_ssh }}
    steps:
      - id: method
        run: |
          if [ -n "$SSH_HOST" ]; then echo "use_ssh=true"; else echo "use_ssh=false"; fi >> $GITHUB_OUTPUT
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}

  deploy-backend:
    name: Deploy PHP Backend
    runs-on: ubuntu-latest
    needs: [detect-changes, check-deploy-method]
    if: |
      github.event_name == 'workflow_dispatch' && (github.event.inputs.deploy_target == 'backend' || github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == '') ||
      github.event_name != 'workflow_dispatch' && (needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.config == 'true')
    steps:
      - name: Check FTP secrets (when not using SSH)
        if: needs.check-deploy-method.outputs.use_ssh != 'true'
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          if [ -z "$FTP_SERVER" ] || [ -z "$FTP_USERNAME" ] || [ -z "$FTP_PASSWORD" ]; then
            echo "::error::Set FTP_SERVER, FTP_USERNAME, FTP_PASSWORD. Or for fast deploys set SSH_HOST, SSH_USERNAME, SSH_PRIVATE_KEY, SSH_REMOTE_API_PATH"
            exit 1
          fi
          echo "FTP secrets OK"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer:v2

      - name: Cache Composer vendor
        uses: actions/cache@v4
        with:
          path: backend-php/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('backend-php/composer.json') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install Composer dependencies
        working-directory: backend-php
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Deploy backend via rsync (fast)
        if: needs.check-deploy-method.outputs.use_ssh == 'true'
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          SSH_USER: ${{ secrets.SSH_USERNAME }}
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_API: ${{ secrets.SSH_REMOTE_API_PATH || 'public_html/api' }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          rsync -avz --delete -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -p $SSH_PORT" \
            --exclude='.git' --exclude='.env' \
            --exclude='scripts/*.json' \
            --exclude='migrations' --exclude='run-migration.php' \
            backend-php/ "$SSH_USER@$SSH_HOST:$REMOTE_API/"
          rm -f ~/.ssh/deploy_key

      - name: Deploy backend via FTP
        if: needs.check-deploy-method.outputs.use_ssh != 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: backend-php/
          server-dir: ${{ secrets.FTP_DEPLOY_DIR || './' }}api/
          state-name: .ftp-deploy-sync-state.json
          log-level: minimal
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/.env
            **/scripts/*.json
            **/migrations/**
            **/run-migration.php

  deploy-frontend:
    name: Build & Deploy Frontend (Static)
    runs-on: ubuntu-latest
    needs: [detect-changes, check-deploy-method]
    if: |
      github.event_name == 'workflow_dispatch' && (github.event.inputs.deploy_target == 'frontend' || github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == '') ||
      github.event_name != 'workflow_dispatch' && (needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.config == 'true')
    steps:
      - name: Check FTP secrets (when not using SSH)
        if: needs.check-deploy-method.outputs.use_ssh != 'true'
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          if [ -z "$FTP_SERVER" ] || [ -z "$FTP_USERNAME" ] || [ -z "$FTP_PASSWORD" ]; then
            echo "::error::Set FTP credentials or SSH_* for fast deploys"
            exit 1
          fi
          echo "FTP secrets OK"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json', 'frontend/pnpm-lock.yaml') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --prefer-offline

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: frontend/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json', 'frontend/pnpm-lock.yaml', 'frontend/next.config.mjs') }}
          restore-keys: nextjs-${{ runner.os }}-

      - name: Create frontend .env
        working-directory: frontend
        run: |
          SITE_URL="${{ secrets.SITE_URL }}"
          [ -z "$SITE_URL" ] && SITE_URL="https://bizbranches.pk"
          cat << EOF > .env.local
          NEXT_PUBLIC_BACKEND_URL=$SITE_URL
          BACKEND_URL=$SITE_URL
          NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
          NEXT_PUBLIC_SITE_URL=$SITE_URL
          NEXT_PUBLIC_STATIC_EXPORT=true
          NODE_ENV=production
          EOF

      - name: Build Next.js (static export)
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_STATIC_EXPORT: "true"

      - name: Verify build output
        run: |
          if [ ! -f frontend/out/index.html ]; then
            echo "::error::Build did not produce frontend/out/index.html"
            ls -la frontend/out/ 2>/dev/null || echo "frontend/out/ missing"
            exit 1
          fi
          echo "Build output OK"

      - name: Copy .htaccess to out
        run: cp cpanel-htaccess frontend/out/.htaccess

      - name: Deploy frontend via rsync (fast)
        if: needs.check-deploy-method.outputs.use_ssh == 'true'
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          SSH_USER: ${{ secrets.SSH_USERNAME }}
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_WEB: ${{ secrets.SSH_REMOTE_WEB_ROOT || 'public_html' }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          rsync -avz --delete -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -p $SSH_PORT" \
            --exclude='.git' --exclude='api' \
            frontend/out/ "$SSH_USER@$SSH_HOST:$REMOTE_WEB/"
          rm -f ~/.ssh/deploy_key

      - name: Deploy frontend via FTP
        if: needs.check-deploy-method.outputs.use_ssh != 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: frontend/out/
          server-dir: ${{ secrets.FTP_DEPLOY_DIR || './' }}
          state-name: .ftp-deploy-sync-state.json
          log-level: minimal
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/api/**
